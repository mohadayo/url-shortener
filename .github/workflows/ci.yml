name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api-server:
    name: api-server (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: url_shortener_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: api-server
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/url_shortener_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -v -race ./...

  cli-client:
    name: cli-client (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli-client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  analytics:
    name: analytics (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pytest

      - name: Run tests
        run: pytest test_analyzer.py -v
        env:
          PYTHONPATH: .
